name: Build APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x PracticeRoutine/gradlew

      - name: APK 빌드 (Debug)
        run: |
          cd PracticeRoutine
          ./gradlew assembleDebug --no-daemon

      - name: APK 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: PracticeRoutine-debug-apk
          path: PracticeRoutine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
